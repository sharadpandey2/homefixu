# Railway uses Nixpacks to build. This tells it to use pnpm instead of npm.
[phases.setup]
nixPkgs = ["nodejs_20", "corepack"]

[phases.install]
cmds = ["corepack enable && pnpm install --frozen-lockfile"]

[phases.build]
cmds = ["pnpm --filter server build"]

[start]
cmd = "pnpm --filter server start"
